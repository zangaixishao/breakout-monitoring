# =============================================================================
# 价格突破监控远程品种配置
#
# 用途：
# - 复制本文件内容到远程 GitHub 仓库，例如：
#   https://github.com/zangaixishao/breakout-monitoring/blob/main/breakout-monitoring.toml
# - 程序启动时由本地 setting.toml 的 [remote_config] 读取这个文件。
#
# 重要边界：
# - 远程文件只放监控品种 [groups]。
# - 发送群、日报、扫描周期、并发、日志、Lark 参数仍然放在本地 setting.toml。
# - 真实 Lark chat_id 仍然放在部署服务器本地 .lark_chat_id.toml。
#
# 支持字段：
# - market_type = "crypto" | "stock" | "futures"
# - region = "us" | "china"
# - exchange = "ccxt" | "yfinance" | "akshare"
# - tickers 使用 TOML 表，格式为 "ticker" = "展示名称"
# =============================================================================

